<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1117">
<title>CodeWorld — Red Pine Kingdom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg: #0c1117;
    --bg-panel: rgba(24, 20, 37, 0.92);
    --border: #265c42;
    --green: #63c74d;
    --green-dim: #3e8948;
    --amber: #feae34;
    --red: #e43b44;
    --text: #c0cbdc;
    --text-dim: #5a6988;
    --text-bright: #ffffff;
    --accent-blue: #0095e9;
    --panel-width: 280px;
    --title-h: 36px;
    --tab-h: 40px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }

  /* ── Title Bar ─────────────────────────── */
  #title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--title-h);
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  #title-bar .logo { font-size: 10px; color: var(--green); letter-spacing: 1px; }
  #title-bar .sep { color: #3a4466; font-size: 10px; }
  #title-bar .subtitle { font-size: 7px; color: var(--text-dim); }
  #title-bar .spacer { flex: 1; }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
    box-shadow: 0 0 6px rgba(228, 59, 68, 0.5);
  }
  #status-dot.connected {
    background: var(--green);
    box-shadow: 0 0 6px rgba(99, 199, 77, 0.5);
  }
  .title-stat { font-size: 7px; color: var(--text-dim); margin-left: 8px; }
  .title-stat .val { color: var(--amber); }

  /* ── Tab Bar ───────────────────────────── */
  #tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-top: 1px solid var(--border);
    gap: 4px;
    padding: 0 8px;
  }
  .tab-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 6px 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--border); }
  .tab-btn.active {
    color: var(--green);
    border-color: var(--green);
    background: rgba(99, 199, 77, 0.1);
  }

  /* ── Main Area ─────────────────────────── */
  #main {
    position: absolute;
    top: var(--title-h);
    left: 0; right: 0;
    bottom: var(--tab-h);
    overflow: hidden;
  }

  /* ── Kingdom Tab (Canvas + Info Panel) ── */
  #kingdom-view {
    width: 100%; height: 100%;
    position: relative;
  }
  #canvas-area {
    width: 100%; height: 100%;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    cursor: grab;
  }
  #canvas-area.dragging { cursor: grabbing; }
  #canvas-wrap {
    transform-origin: 0 0;
    position: absolute;
    top: 0; left: 0;
  }
  canvas#screen {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
  }

  /* Building/agent highlight */
  #highlight-box {
    position: absolute;
    border: 2px solid var(--amber);
    border-radius: 2px;
    pointer-events: none;
    display: none;
    box-shadow: 0 0 8px rgba(254, 174, 52, 0.4);
    transition: all 0.15s ease;
  }

  /* ── Info Panel (overlay, doesn't steal layout space) ── */
  #info-panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: var(--panel-width);
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 60;
  }
  #info-panel.open { transform: translateX(0); }
  #info-panel h3 {
    font-size: 9px;
    color: var(--green);
    margin-bottom: 4px;
  }
  #info-panel .info-label {
    font-size: 7px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  #info-panel .info-value {
    font-size: 8px;
    color: var(--text);
    margin-top: 2px;
  }
  #info-panel .info-type {
    display: inline-block;
    padding: 2px 6px;
    background: rgba(99, 199, 77, 0.15);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 6px;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .info-close {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    cursor: pointer;
  }
  .info-close:hover { color: var(--text); }

  /* ── Agents Tab ────────────────────────── */
  #agents-view {
    width: 100%; height: 100%;
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  #agents-view h2 {
    font-size: 10px;
    color: var(--green);
    margin-bottom: 16px;
  }
  .agent-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: rgba(24, 20, 37, 0.6);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .agent-card:hover { background: rgba(38, 92, 66, 0.2); }
  .agent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .agent-dot.idle { background: var(--text-dim); }
  .agent-dot.walking { background: var(--green); }
  .agent-dot.working { background: var(--amber); }
  .agent-name { font-size: 8px; color: var(--text); flex: 1; }
  .agent-role { font-size: 6px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .agent-state { font-size: 6px; color: var(--green-dim); }

  /* ── Stats Tab ─────────────────────────── */
  #stats-view {
    width: 100%; height: 100%;
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  #stats-view h2 {
    font-size: 10px;
    color: var(--green);
    margin-bottom: 16px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    padding: 12px;
    background: rgba(24, 20, 37, 0.6);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .stat-card .label { font-size: 6px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 14px; color: var(--amber); margin-top: 6px; }
  .stat-card .sub { font-size: 6px; color: var(--text-dim); margin-top: 4px; }
  .milestone-bar {
    width: 100%;
    height: 8px;
    background: rgba(38, 92, 66, 0.3);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }
  .milestone-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* ── Settings Tab ──────────────────────── */
  #settings-view {
    width: 100%; height: 100%;
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  #settings-view h2 {
    font-size: 10px;
    color: var(--green);
    margin-bottom: 16px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(38, 92, 66, 0.2);
  }
  .setting-label { font-size: 7px; color: var(--text); }
  .setting-desc { font-size: 6px; color: var(--text-dim); margin-top: 4px; }
  .setting-row input[type="range"] {
    width: 100px;
    accent-color: var(--green);
  }
  .setting-row input[type="checkbox"] {
    accent-color: var(--green);
    width: 16px; height: 16px;
  }

  /* ── Disconnected Overlay ─────────────── */
  #disconnected-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 80;
    text-align: center;
    padding: 24px;
    transition: opacity 0.5s ease;
  }
  #disconnected-overlay.hidden { opacity: 0; pointer-events: none; }
  #disconnected-overlay h2 {
    font-size: 14px;
    color: var(--green);
    margin-bottom: 16px;
  }
  #disconnected-overlay p {
    font-size: 8px;
    color: var(--text-dim);
    line-height: 2;
    max-width: 500px;
  }
  #disconnected-overlay code {
    display: inline-block;
    background: rgba(99, 199, 77, 0.15);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 7px;
    color: var(--amber);
    margin: 4px 0;
  }
  #disconnected-overlay .dot-pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 1.5s ease-in-out infinite;
    margin-bottom: 12px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Zoom Controls ─────────────────────── */
  #zoom-controls {
    position: absolute;
    bottom: 12px; right: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }
  .zoom-btn {
    width: 28px; height: 28px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .zoom-btn:hover { background: rgba(38, 92, 66, 0.3); }
  #zoom-level {
    font-size: 6px;
    color: var(--text-dim);
    text-align: center;
    padding: 2px;
  }

  /* ── Mobile ────────────────────────────── */
  @media (max-width: 768px) {
    :root {
      --panel-width: 100%;
      --title-h: 32px;
      --tab-h: 44px;
    }
    #title-bar { padding: 0 8px; gap: 6px; }
    #title-bar .logo { font-size: 8px; }
    .title-stat { display: none; }
    #info-panel {
      top: auto;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      max-height: 55%;
      border-left: none;
      border-top: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
    }
    #info-panel.open { transform: translateY(0); }
    .stat-grid { grid-template-columns: 1fr; }
    .tab-btn { padding: 8px 12px; font-size: 7px; }
    #tab-bar { padding-bottom: env(safe-area-inset-bottom, 0); }
    #zoom-controls { bottom: 8px; right: 8px; }
    .zoom-btn { width: 36px; height: 36px; font-size: 14px; }
  }

  @media (max-width: 400px) {
    .tab-btn { padding: 6px 8px; font-size: 6px; }
  }
</style>
</head>
<body>

<!-- Title Bar -->
<div id="title-bar">
  <span class="logo">CODEWORLD</span>
  <span class="sep">|</span>
  <span class="subtitle">Red Pine Kingdom</span>
  <span class="spacer"></span>
  <span class="title-stat">RES <span class="val" id="t-res">--</span></span>
  <span class="title-stat">FPS <span class="val" id="t-fps">--</span></span>
  <span class="title-stat" id="t-milestone-wrap"><span class="val" id="t-milestone">--</span></span>
  <div id="status-dot"></div>
</div>

<!-- Main Content -->
<div id="main">
  <!-- Disconnected Overlay -->
  <div id="disconnected-overlay">
    <div class="dot-pulse"></div>
    <h2>CODEWORLD</h2>
    <p>Waiting for the kingdom server...</p>
    <p style="margin-top:12px">Run this on your machine:</p>
    <p><code>cd codeworld && .venv/bin/python main.py --headless</code></p>
    <p style="margin-top:12px;font-size:7px;color:var(--text-dim)">
      Then reload this page. The kingdom will appear once the server is running.
    </p>
  </div>

  <!-- Kingdom View (default) -->
  <div id="kingdom-view">
    <div id="canvas-area">
      <div id="canvas-wrap">
        <canvas id="screen"></canvas>
      </div>
      <div id="highlight-box"></div>
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <div id="zoom-level">1x</div>
        <button class="zoom-btn" id="zoom-out">-</button>
        <button class="zoom-btn" id="zoom-reset" style="font-size:6px;margin-top:4px;">FIT</button>
      </div>
    </div>
    <div id="info-panel">
      <div id="info-content"></div>
    </div>
  </div>

  <!-- Agents View -->
  <div id="agents-view">
    <h2>AI Agents</h2>
    <div id="agents-list"></div>
  </div>

  <!-- Stats View -->
  <div id="stats-view">
    <h2>Kingdom Stats</h2>
    <div id="stats-content"></div>
  </div>

  <!-- Settings View -->
  <div id="settings-view">
    <h2>Settings</h2>
    <div id="settings-content"></div>
  </div>
</div>

<!-- Tab Bar -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="kingdom">Kingdom</button>
  <button class="tab-btn" data-tab="agents">Agents</button>
  <button class="tab-btn" data-tab="stats">Stats</button>
  <button class="tab-btn" data-tab="settings">Settings</button>
</div>

<script>
(function() {
  "use strict";

  // ── DOM refs ──────────────────────────────────────────
  var canvas = document.getElementById("screen");
  var ctx = canvas.getContext("2d");
  var statusDot = document.getElementById("status-dot");
  var resEl = document.getElementById("t-res");
  var fpsEl = document.getElementById("t-fps");
  var milestoneEl = document.getElementById("t-milestone");
  var canvasArea = document.getElementById("canvas-area");
  var canvasWrap = document.getElementById("canvas-wrap");
  var highlightBox = document.getElementById("highlight-box");
  var infoPanel = document.getElementById("info-panel");
  var infoContent = document.getElementById("info-content");
  var zoomLevelEl = document.getElementById("zoom-level");

  // ── State ─────────────────────────────────────────────
  var frameW = 0, frameH = 0;
  var imageData = null;
  var ws = null;
  var reconnectTimer = null;
  var frameCount = 0;
  var lastFpsUpdate = performance.now();
  var currentTab = "kingdom";
  var sceneData = null;
  window._cw = {}; // debug access
  var selectedItem = null;

  // Zoom/pan state
  var zoom = 1;
  var panX = 0, panY = 0;
  var isDragging = false;
  var dragStartX = 0, dragStartY = 0;
  var dragStartPanX = 0, dragStartPanY = 0;

  // Touch state
  var lastTouchDist = 0;
  var lastTouchX = 0, lastTouchY = 0;

  // ── Tab Switching ─────────────────────────────────────
  var tabs = document.querySelectorAll(".tab-btn");
  var views = {
    kingdom: document.getElementById("kingdom-view"),
    agents: document.getElementById("agents-view"),
    stats: document.getElementById("stats-view"),
    settings: document.getElementById("settings-view"),
  };

  function switchTab(tab) {
    currentTab = tab;
    tabs.forEach(function(t) {
      t.classList.toggle("active", t.dataset.tab === tab);
    });
    Object.keys(views).forEach(function(k) {
      views[k].style.display = k === tab ? (k === "kingdom" ? "flex" : "block") : "none";
    });
    if (tab === "agents") renderAgentsList();
    if (tab === "stats") renderStats();
    if (tab === "settings") renderSettings();
  }

  tabs.forEach(function(t) {
    t.addEventListener("click", function() { switchTab(t.dataset.tab); });
  });

  // ── Canvas Resize ─────────────────────────────────────
  function fitCanvas() {
    if (frameW === 0 || frameH === 0) return;
    var rect = canvasArea.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    var scaleX = rect.width / frameW;
    var scaleY = rect.height / frameH;
    var isPortrait = rect.height > rect.width * 1.2;
    var fitZoom;
    if (isPortrait) {
      // Portrait: fill height so the kingdom is immersive, user pans horizontally
      fitZoom = Math.max(scaleX, scaleY);
    } else {
      // Landscape/desktop: fit within viewport
      fitZoom = Math.min(scaleX, scaleY);
    }
    // Snap to integer for crisp pixels when zoomed in
    if (fitZoom >= 2) fitZoom = Math.floor(fitZoom);
    zoom = Math.max(1, fitZoom);
    // Center the canvas
    panX = (rect.width - frameW * zoom) / 2;
    panY = (rect.height - frameH * zoom) / 2;
    applyTransform();
  }

  function applyTransform() {
    canvasWrap.style.transform = "translate(" + panX + "px," + panY + "px) scale(" + zoom + ")";
    zoomLevelEl.textContent = zoom >= 1 ? Math.round(zoom) + "x" : zoom.toFixed(1) + "x";
  }

  window.addEventListener("resize", function() {
    requestAnimationFrame(fitCanvas);
  });

  // ── Zoom Controls ─────────────────────────────────────
  function zoomBy(factor, cx, cy) {
    var rect = canvasArea.getBoundingClientRect();
    if (cx === undefined) cx = rect.width / 2;
    if (cy === undefined) cy = rect.height / 2;

    var oldZoom = zoom;
    zoom = Math.max(0.5, Math.min(8, zoom * factor));
    if (zoom >= 2) zoom = Math.round(zoom);

    // Zoom toward cursor position
    panX = cx - (cx - panX) * (zoom / oldZoom);
    panY = cy - (cy - panY) * (zoom / oldZoom);

    applyTransform();
  }

  document.getElementById("zoom-in").addEventListener("click", function() { zoomBy(1.5); });
  document.getElementById("zoom-out").addEventListener("click", function() { zoomBy(0.67); });
  document.getElementById("zoom-reset").addEventListener("click", fitCanvas);

  // Mouse wheel zoom
  canvasArea.addEventListener("wheel", function(e) {
    e.preventDefault();
    var rect = canvasArea.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    var factor = e.deltaY < 0 ? 1.15 : 0.87;
    zoomBy(factor, cx, cy);
  }, { passive: false });

  // ── Pan (Mouse) ───────────────────────────────────────
  canvasArea.addEventListener("mousedown", function(e) {
    if (e.button !== 0) return;
    isDragging = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartPanX = panX;
    dragStartPanY = panY;
    canvasArea.classList.add("dragging");

    function onMove(e) {
      var dx = e.clientX - dragStartX;
      var dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
      panX = dragStartPanX + dx;
      panY = dragStartPanY + dy;
      applyTransform();
    }

    function onUp(e) {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      canvasArea.classList.remove("dragging");
      if (!isDragging) {
        handleCanvasClick(e);
      }
    }

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });

  // ── Pan/Zoom (Touch) ─────────────────────────────────
  canvasArea.addEventListener("touchstart", function(e) {
    if (e.touches.length === 1) {
      isDragging = false;
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      dragStartPanX = panX;
      dragStartPanY = panY;
    } else if (e.touches.length === 2) {
      var dx = e.touches[1].clientX - e.touches[0].clientX;
      var dy = e.touches[1].clientY - e.touches[0].clientY;
      lastTouchDist = Math.sqrt(dx * dx + dy * dy);
      lastTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
    e.preventDefault();
  }, { passive: false });

  canvasArea.addEventListener("touchmove", function(e) {
    if (e.touches.length === 1) {
      var dx = e.touches[0].clientX - dragStartX;
      var dy = e.touches[0].clientY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
      panX = dragStartPanX + dx;
      panY = dragStartPanY + dy;
      applyTransform();
    } else if (e.touches.length === 2) {
      var dx = e.touches[1].clientX - e.touches[0].clientX;
      var dy = e.touches[1].clientY - e.touches[0].clientY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      var rect = canvasArea.getBoundingClientRect();
      if (lastTouchDist > 0) {
        zoomBy(dist / lastTouchDist, cx - rect.left, cy - rect.top);
      }
      lastTouchDist = dist;
      lastTouchX = cx;
      lastTouchY = cy;
    }
    e.preventDefault();
  }, { passive: false });

  canvasArea.addEventListener("touchend", function(e) {
    if (e.touches.length === 0 && !isDragging) {
      handleCanvasClick({
        clientX: dragStartX,
        clientY: dragStartY,
      });
    }
    lastTouchDist = 0;
  });

  // ── Click Detection ───────────────────────────────────
  function handleCanvasClick(e) {
    if (!sceneData) return;

    var rect = canvasArea.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;

    // Convert screen coords to canvas pixel coords
    var px = (cx - panX) / zoom;
    var py = (cy - panY) / zoom;

    // Check buildings (reverse order so top-drawn buildings are checked first)
    for (var i = sceneData.buildings.length - 1; i >= 0; i--) {
      var b = sceneData.buildings[i];
      if (px >= b.x && px < b.x + b.w && py >= b.y && py < b.y + b.h) {
        selectBuilding(b);
        return;
      }
    }

    // Check agents (6px hit radius)
    for (var j = 0; j < sceneData.agents.length; j++) {
      var a = sceneData.agents[j];
      if (Math.abs(px - a.x) < 6 && Math.abs(py - a.y) < 6) {
        selectAgent(a);
        return;
      }
    }

    // Click on empty space — dismiss
    deselectAll();
  }

  function selectBuilding(b) {
    selectedItem = { type: "building", data: b };
    showHighlight(b.x, b.y, b.w, b.h);
    showBuildingInfo(b);
  }

  function selectAgent(a) {
    selectedItem = { type: "agent", data: a };
    showHighlight(a.x - 4, a.y - 4, 8, 8);
    showAgentInfo(a);
  }

  function deselectAll() {
    selectedItem = null;
    highlightBox.style.display = "none";
    infoPanel.classList.remove("open");
  }

  function showHighlight(x, y, w, h) {
    highlightBox.style.display = "block";
    highlightBox.style.left = (panX + x * zoom - 2) + "px";
    highlightBox.style.top = (panY + y * zoom - 2) + "px";
    highlightBox.style.width = (w * zoom + 4) + "px";
    highlightBox.style.height = (h * zoom + 4) + "px";
  }

  function updateHighlight() {
    if (!selectedItem) return;
    var d = selectedItem.data;
    if (selectedItem.type === "building") {
      showHighlight(d.x, d.y, d.w, d.h);
    } else {
      showHighlight(d.x - 4, d.y - 4, 8, 8);
    }
  }

  // ── Info Panel Content ────────────────────────────────
  function showBuildingInfo(b) {
    var typeLabel = b.is_hq ? "HEADQUARTERS" :
                    b.is_district ? "DISTRICT" :
                    b.is_customer ? "CUSTOMER" : "BUILDING";
    var icon = b.is_hq ? "&#x1F3F0;" :
               b.is_district ? "&#x1F3DB;" :
               b.is_customer ? "&#x1F3E2;" : "&#x1F3E0;";

    var html = '<button class="info-close" onclick="document.getElementById(\'info-panel\').classList.remove(\'open\')">&times;</button>';
    html += '<h3>' + icon + ' ' + escHtml(b.name) + '</h3>';
    html += '<span class="info-type">' + typeLabel + '</span>';

    if (b.is_customer && b.customer_type) {
      html += '<div class="info-label">BUSINESS TYPE</div>';
      html += '<div class="info-value">' + escHtml(b.customer_type.replace(/_/g, " ")) + '</div>';
    }

    if (b.is_district) {
      var districtDescs = {
        forge: "Dashboard & Codebase Management",
        market: "Portal & Marketplace",
        library: "Documentation & Onboarding",
        tower: "COO & AI Agent Oversight",
        tavern: "Communications Hub",
      };
      var desc = districtDescs[b.type] || b.type;
      html += '<div class="info-label">FUNCTION</div>';
      html += '<div class="info-value">' + escHtml(desc) + '</div>';
    }

    html += '<div class="info-label">POSITION</div>';
    html += '<div class="info-value">' + b.x + ', ' + b.y + ' (' + b.w + '&times;' + b.h + 'px)</div>';

    infoContent.innerHTML = html;
    infoPanel.classList.add("open");
  }

  function showAgentInfo(a) {
    var stateColors = { idle: "#5a6988", walking: "#63c74d", working: "#feae34" };
    var roleNames = {
      coo: "Chief Operating Officer",
      receptionist: "Receptionist",
      content_writer: "Content Writer",
      review_manager: "Review Manager",
      route_planner: "Route Planner",
      villager: "Townsperson",
      worker: "Worker",
    };

    var html = '<button class="info-close" onclick="document.getElementById(\'info-panel\').classList.remove(\'open\')">&times;</button>';
    html += '<h3>&#x1F9D1; ' + escHtml(a.name) + '</h3>';
    html += '<span class="info-type">' + escHtml(a.role) + '</span>';

    html += '<div class="info-label">ROLE</div>';
    html += '<div class="info-value">' + escHtml(roleNames[a.role] || a.role) + '</div>';

    html += '<div class="info-label">STATUS</div>';
    html += '<div class="info-value" style="color:' + (stateColors[a.state] || "#c0cbdc") + '">' +
            escHtml(a.state.charAt(0).toUpperCase() + a.state.slice(1)) + '</div>';

    html += '<div class="info-label">POSITION</div>';
    html += '<div class="info-value">' + a.x + ', ' + a.y + '</div>';

    infoContent.innerHTML = html;
    infoPanel.classList.add("open");
  }

  // ── Agents List Tab ───────────────────────────────────
  function renderAgentsList() {
    var el = document.getElementById("agents-list");
    if (!sceneData || !sceneData.agents) {
      el.innerHTML = '<div style="font-size:7px;color:var(--text-dim)">No scene data yet...</div>';
      return;
    }

    var agents = sceneData.agents.slice();
    // Sort: role agents first, then villagers
    var rolePriority = { coo: 0, receptionist: 1, content_writer: 2, review_manager: 3, route_planner: 4 };
    agents.sort(function(a, b) {
      var pa = rolePriority[a.role] !== undefined ? rolePriority[a.role] : 10;
      var pb = rolePriority[b.role] !== undefined ? rolePriority[b.role] : 10;
      return pa - pb;
    });

    var html = '';
    agents.forEach(function(a) {
      html += '<div class="agent-card" data-ax="' + a.x + '" data-ay="' + a.y + '">';
      html += '<div class="agent-dot ' + a.state + '"></div>';
      html += '<div>';
      html += '<div class="agent-name">' + escHtml(a.name) + '</div>';
      html += '<div class="agent-role">' + escHtml(a.role) + '</div>';
      html += '</div>';
      html += '<div class="agent-state">' + escHtml(a.state) + '</div>';
      html += '</div>';
    });
    el.innerHTML = html;

    // Click to focus on agent in canvas
    el.querySelectorAll(".agent-card").forEach(function(card) {
      card.addEventListener("click", function() {
        var ax = parseFloat(card.dataset.ax);
        var ay = parseFloat(card.dataset.ay);
        switchTab("kingdom");
        centerOn(ax, ay, 4);
      });
    });
  }

  function centerOn(x, y, targetZoom) {
    var rect = canvasArea.getBoundingClientRect();
    zoom = targetZoom || 3;
    panX = rect.width / 2 - x * zoom;
    panY = rect.height / 2 - y * zoom;
    applyTransform();
  }

  // ── Stats Tab ─────────────────────────────────────────
  function renderStats() {
    var el = document.getElementById("stats-content");
    if (!sceneData || !sceneData.metrics) {
      el.innerHTML = '<div style="font-size:7px;color:var(--text-dim)">No data yet...</div>';
      return;
    }
    var m = sceneData.metrics;
    var ms = sceneData.milestone || "--";
    var prog = sceneData.milestone_progress || 0;

    var html = '';

    // Milestone bar
    html += '<div class="stat-card" style="grid-column: 1/-1">';
    html += '<div class="label">MILESTONE</div>';
    html += '<div class="value" style="font-size:11px;color:var(--green)">' + escHtml(ms) + '</div>';
    html += '<div class="milestone-bar"><div class="milestone-fill" style="width:' + (prog * 100).toFixed(0) + '%"></div></div>';
    html += '<div class="sub">' + (prog * 100).toFixed(0) + '% to next milestone</div>';
    html += '</div>';

    html += '<div class="stat-grid">';

    html += statCard("REVENUE", "$" + formatNum(m.revenue), "/month");
    html += statCard("CUSTOMERS", m.customers, "active");
    html += statCard("POPULATION", m.population || (m.customers + (sceneData.agents ? sceneData.agents.length : 0)), "citizens");
    html += statCard("AGE", m.age_days + "d", "since founding");
    html += statCard("CODEBASE", formatNum(m.codebase_loc), "lines of code");
    html += statCard("FILES", m.codebase_files, "source files");
    html += statCard("GIT BRANCH", m.git_branch || "--", "");
    html += statCard("COMMITS", m.git_commits_30d, "last 30 days");
    html += statCard("AGENTS", m.active_agents, "active sessions");
    html += statCard("TOOL CALLS", formatNum(m.total_tool_calls), "total");

    html += '</div>';
    el.innerHTML = html;
  }

  function statCard(label, value, sub) {
    return '<div class="stat-card"><div class="label">' + label + '</div>' +
           '<div class="value">' + value + '</div>' +
           (sub ? '<div class="sub">' + sub + '</div>' : '') + '</div>';
  }

  // ── Settings Tab ──────────────────────────────────────
  function renderSettings() {
    var el = document.getElementById("settings-content");
    var html = '';

    html += '<div class="setting-row"><div><div class="setting-label">WebSocket URL</div>';
    html += '<div class="setting-desc">Server address for the kingdom data</div></div>';
    html += '<div style="font-size:7px;color:var(--amber)">' + wsUrl + '</div></div>';

    html += '<div class="setting-row"><div><div class="setting-label">Zoom Level</div>';
    html += '<div class="setting-desc">Current zoom: ' + zoom.toFixed(1) + 'x</div></div>';
    html += '<input type="range" min="0.5" max="8" step="0.5" value="' + zoom + '" id="s-zoom"></div>';

    html += '<div class="setting-row"><div><div class="setting-label">Canvas Size</div>';
    html += '<div class="setting-desc">' + frameW + ' x ' + frameH + ' pixels</div></div>';
    html += '<div style="font-size:7px;color:var(--text-dim)">' + (frameW * frameH) + 'px</div></div>';

    html += '<div class="setting-row"><div><div class="setting-label">Connection</div>';
    html += '<div class="setting-desc">WebSocket status</div></div>';
    var connStatus = ws && ws.readyState === WebSocket.OPEN ? "Connected" : "Disconnected";
    var connColor = ws && ws.readyState === WebSocket.OPEN ? "var(--green)" : "var(--red)";
    html += '<div style="font-size:7px;color:' + connColor + '">' + connStatus + '</div></div>';

    html += '<div class="setting-row"><div><div class="setting-label">Phone Access</div>';
    html += '<div class="setting-desc">Open this URL on your phone (same WiFi)</div></div>';
    html += '<div style="font-size:6px;color:var(--amber);word-break:break-all">' + window.location.href + '</div></div>';

    el.innerHTML = html;

    var zoomSlider = document.getElementById("s-zoom");
    if (zoomSlider) {
      zoomSlider.addEventListener("input", function() {
        zoom = parseFloat(this.value);
        var rect = canvasArea.getBoundingClientRect();
        panX = (rect.width - frameW * zoom) / 2;
        panY = (rect.height - frameH * zoom) / 2;
        applyTransform();
      });
    }
  }

  // ── WebSocket ─────────────────────────────────────────
  var overlay = document.getElementById("disconnected-overlay");
  var hasConnected = false;

  // Support ?ws=host:port URL parameter for remote connections
  var params = new URLSearchParams(window.location.search);
  var wsHost = params.get("ws") || (window.location.hostname + ":" + (window.location.port || "8765"));
  var wsUrl = "ws://" + wsHost;

  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      reconnectTimer = setTimeout(connect, 3000);
      return;
    }
    ws.binaryType = "arraybuffer";

    ws.onopen = function() {
      statusDot.classList.add("connected");
      hasConnected = true;
      overlay.classList.add("hidden");
    };

    ws.onmessage = function(evt) {
      if (evt.data instanceof ArrayBuffer) {
        onBinaryFrame(evt.data);
      } else if (typeof evt.data === "string") {
        onJsonMessage(evt.data);
      }
    };

    ws.onclose = function() {
      statusDot.classList.remove("connected");
      if (!hasConnected) {
        overlay.classList.remove("hidden");
      }
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = function() { ws.close(); };
  }

  function onBinaryFrame(buf) {
    var view = new DataView(buf);
    if (buf.byteLength < 4) return;

    var w = view.getUint16(0, false);
    var h = view.getUint16(2, false);
    var expected = 4 + w * h * 3;
    if (buf.byteLength < expected) return;

    if (w !== frameW || h !== frameH) {
      frameW = w;
      frameH = h;
      canvas.width = frameW;
      canvas.height = frameH;
      imageData = ctx.createImageData(frameW, frameH);
      resEl.textContent = frameW + "x" + frameH;
      fitCanvas();
    }

    var src = new Uint8Array(buf, 4);
    var dst = imageData.data;
    var pixels = frameW * frameH;
    for (var i = 0; i < pixels; i++) {
      var si = i * 3;
      var di = i * 4;
      dst[di]     = src[si];
      dst[di + 1] = src[si + 1];
      dst[di + 2] = src[si + 2];
      dst[di + 3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);

    // Update highlight position (buildings may have moved due to agents)
    updateHighlight();

    // FPS counter
    frameCount++;
    var now = performance.now();
    if (now - lastFpsUpdate > 1000) {
      fpsEl.textContent = frameCount;
      frameCount = 0;
      lastFpsUpdate = now;
    }
  }

  function onJsonMessage(text) {
    try {
      var data = JSON.parse(text);
      if (data.type === "scene") {
        sceneData = data;
        window._cw.scene = data;
        window._cw.zoom = zoom;
        window._cw.panX = panX;
        window._cw.panY = panY;
        milestoneEl.textContent = data.milestone || "--";

        // Update selected item data if it still exists
        if (selectedItem) {
          if (selectedItem.type === "agent") {
            var found = data.agents.find(function(a) {
              return a.name === selectedItem.data.name && a.role === selectedItem.data.role;
            });
            if (found) {
              selectedItem.data = found;
              updateHighlight();
            }
          }
        }
      }
    } catch (e) { /* ignore malformed JSON */ }
  }

  // ── Helpers ───────────────────────────────────────────
  function escHtml(s) {
    if (!s) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function formatNum(n) {
    if (n === undefined || n === null) return "0";
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000) return (n / 1000).toFixed(1) + "K";
    return String(n);
  }

  // ── Init ──────────────────────────────────────────────
  renderSettings();
  connect();

})();
</script>
</body>
</html>
